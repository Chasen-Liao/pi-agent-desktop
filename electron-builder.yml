appId: com.agegr.pi-agent-desktop
productName: Pi Agent Desktop
copyright: Copyright © 2026 Chasen

directories:
  output: release
  buildResources: build

files:
  - package.json
  - electron/dist/**/*
  - "!electron/**/*.ts"
  - "!electron/tsconfig.json"
  - "!node_modules/**/*"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!node_modules"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

asar: false

npmRebuild: true

electronDist: node_modules/electron/dist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pi Agent Desktop
  uninstallDisplayName: Pi Agent Desktop
  artifactName: "${productName}-Setup-${version}.${ext}"
  include: build/installer.nsh

publish:
  provider: github
  owner: agegr
  repo: pi-agent-desktop
