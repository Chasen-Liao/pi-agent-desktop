appId: com.agegr.pi-agent-desktop
productName: Pi Agent Desktop
copyright: Copyright © 2026 Chasen

directories:
  output: release
  buildResources: build

files:
  - package.json
  - build/icon.ico
  - electron/dist/**/*
  - "!electron/**/*.ts"
  - "!electron/tsconfig.json"
  - "!node_modules/**/*"

extraResources:
  - from: node_modules/electron-updater
    to: app/node_modules/electron-updater
  - from: node_modules/builder-util-runtime
    to: app/node_modules/builder-util-runtime
  - from: node_modules/js-yaml
    to: app/node_modules/js-yaml
  - from: node_modules/lazy-val
    to: app/node_modules/lazy-val
  - from: node_modules/lodash.escaperegexp
    to: app/node_modules/lodash.escaperegexp
  - from: node_modules/lodash.isequal
    to: app/node_modules/lodash.isequal
  - from: node_modules/tiny-typed-emitter
    to: app/node_modules/tiny-typed-emitter
  - from: node_modules/debug
    to: app/node_modules/debug
  - from: node_modules/sax
    to: app/node_modules/sax
  - from: node_modules/argparse
    to: app/node_modules/argparse
  - from: node_modules/ms
    to: app/node_modules/ms
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!node_modules"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

asar: false

npmRebuild: true

electronDist: node_modules/electron/dist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pi Agent Desktop
  uninstallDisplayName: Pi Agent Desktop
  artifactName: "Pi-Agent-Desktop-Setup-${version}.${ext}"
  include: build/installer.nsh

publish:
  provider: github
  owner: Chasen-Liao
  repo: pi-agent-desktop
